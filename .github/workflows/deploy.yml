name: Deploy to Firebase & Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & Push Docker image
        run: |
          gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet
          docker build -t asia-northeast3-docker.pkg.dev/chatbot-copilot-82b0a/ip-assist/backend:${{ github.sha }} ./backend
          docker push asia-northeast3-docker.pkg.dev/chatbot-copilot-82b0a/ip-assist/backend:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ip-assist-backend \
            --image asia-northeast3-docker.pkg.dev/chatbot-copilot-82b0a/ip-assist/backend:${{ github.sha }} \
            --region asia-northeast3 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }},SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 3

  deploy-frontend:
    name: Deploy Frontend to Firebase
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        working-directory: frontend
        run: |
          npm ci
          VITE_API_URL=https://ip-assist-backend-1058034030780.asia-northeast3.run.app npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: chatbot-copilot-82b0a
          entryPoint: frontend
